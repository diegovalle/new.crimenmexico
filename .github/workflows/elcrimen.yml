name: Build https://elcri.men
on:
  #  (repo scope token) curl -H "Accept: application/vnd.github+json" -H "Authorization: token <TOKEN>" --request POST --data '{"event_type": "deploy-website"}' https://api.github.com/repos/diegovalle/new.crimenmexico/dispatches
  repository_dispatch:
    types: deploy-website
  # Trigger the workflow on push or pull request,
  # but only for the master branch
  push:
    branches:
      - master

permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Get-Date:
    name: create a name for the github tag
    runs-on: ubuntu-latest
    outputs:
      git_tag: ${{ steps.get_date.outputs.git_tag }}
    steps:
      - id: get_date
        run: echo "git_tag=v$(date +%Y.%m.%d-%H)" >> "$GITHUB_OUTPUT"

  Build-Elcrimen:
    name: Deploy Elcri.men
    needs: Get-Date
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write # Grants write access exclusively to this specific job
    container:
      image: diegovalle/elcrimen-docker@sha256:ff3d8590009bb472a68dd18746039e25ecf8f7dbcb50daff9c61cdf46ea044af
      options: --workdir /home/rstudio/new.crimenmexico --user rstudio
      credentials:
        username: diegovalle
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
      volumes:
        - /usr/share/dotnet:/usr/share/dotnet
        - /opt/ghc
        - /usr/local/lib/android:/usr/local/lib/android
        - /opt/hostedtoolcache/CodeQL
      env:
        ANSIBLE_PASSWORD: ${{ secrets.ANSIBLE_PASSWORD }}
        DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        GH_EMAIL: ${{ secrets.GH_EMAIL }}
        # 'GITHUB_PAT' For installing mxmortalitydb and commiting changes
        GITHUB_PAT: ${{ secrets.GT_PAT }}
        NETLIFYAPIKEY: ${{ secrets.NETLIFYAPIKEY }}
        SEMAPHORE_API_TOKEN: ${{ secrets.SEMAPHORE_API_TOKEN }}
        SEMAPHORE_PROJECT_ID: ${{ secrets.SEMAPHORE_PROJECT_ID }}
        SEMAPHORE_REF: ${{ secrets.SEMAPHORE_REF }}
        B2_BUCKET: ${{ secrets.B2_BUCKET }}
        B2_APPKEY_ID: ${{ secrets.B2_APPKEY_ID }}
        B2_APPKEY: ${{ secrets.B2_APPKEY }}
        CACHE_INVALIDATE_HEADER: ${{ secrets.CACHE_INVALIDATE_HEADER }}
        GIT_TAG: ${{needs.Get-Date.outputs.git_tag}}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - run: df -h

      - name: Echo date time for git tag and github release
        run: echo "$GIT_TAG"

      - name: Build the website (https://elcri.men)
        run: |
          bash -c "export HOME=/home/rstudio && cd ~/new.crimenmexico/ansible/ && cd ~/new.crimenmexico && git config --global url.'https://github.com/'.insteadOf git@github.com: && git config --global url.'https://'.insteadOf git:// && git pull && make"

      - run: df -h

      - name: Invalidate stale cache
        run: |
          curl --retry 15 -o /dev/null -v https://data.diegovalle.net/elcrimen/nm-estatal-victimas.csv.gz -H "$CACHE_INVALIDATE_HEADER:true"
          curl --retry 15 -o /dev/null -v https://data.diegovalle.net/elcrimen/nm-fuero-comun-estados.csv.gz -H "$CACHE_INVALIDATE_HEADER:true"
          curl --retry 15 -o /dev/null -v https://data.diegovalle.net/elcrimen/nm-estatal-victimas.csv.gz -H "$CACHE_INVALIDATE_HEADER:true"

      - name: Trigger semaphore to create the json for the state trends webpage
        run: >
          curl  --retry 15 -i -H "Authorization: Token $SEMAPHORE_API_TOKEN"
          -d "project_id=$SEMAPHORE_PROJECT_ID&reference=$SEMAPHORE_REF"
          -X POST  "https://diegovalle.semaphoreci.com/api/v1alpha/plumber-workflows"

      - name: Change permissions
        run: |
          id -a
          mv /home/rstudio/new.crimenmexico /tmp/

      - name: Upload build artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          if-no-files-found: "warn"
          name: elcrimen-sqlite-db
          path: |
            /tmp/new.crimenmexico/db/crimenmexico.db
            /tmp/new.crimenmexico/R/graphs/*.png
            /tmp/new.crimenmexico/elcrimen/static/smooth-latest.png
          retention-days: 2

      - name: Upload crime data artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          if-no-files-found: warn
          name: data-files
          path: |
            /tmp/new.crimenmexico/data/*.gz
          retention-days: 5

      - name: Upload website html artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          if-no-files-found: warn
          name: elcrimen_html
          path: |
            /tmp/new.crimenmexico/elcri.men/public
          retention-days: 7

      - run: echo "🍏 This job's status is ${JOB_STATUS}."
        env:
          JOB_STATUS: ${{ job.status }}

  Github-Release:
    name: create a github release
    runs-on: ubuntu-latest
    needs: [Get-Date, Build-Elcrimen]
    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{needs.Get-Date.outputs.git_tag}}
        run: |
          echo "$GIT_TAG"
          gh release create "$GIT_TAG" \
            --repo="$GITHUB_REPOSITORY" \
            --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
            --generate-notes
